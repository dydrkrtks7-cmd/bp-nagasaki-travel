<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b71c1c"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd600"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="305" cy="591" r="47" fill="#880e4f" opacity="0.20"/>
    <circle cx="284" cy="222" r="31" fill="#880e4f" opacity="0.06"/>
    <circle cx="1202" cy="537" r="66" fill="#880e4f" opacity="0.17"/>
    <circle cx="348" cy="595" r="60" fill="#880e4f" opacity="0.09"/>
    <circle cx="-95" cy="262" r="77" fill="#880e4f" opacity="0.17"/>
    <circle cx="994" cy="700" r="89" fill="#880e4f" opacity="0.17"/>
    <rect x="1191" y="138" width="59" height="42" rx="8" fill="#b71c1c" opacity="0.10" transform="rotate(33, 740, 520)"/>
    <rect x="91" y="358" width="95" height="87" rx="8" fill="#b71c1c" opacity="0.10" transform="rotate(42, 310, 298)"/>
    <rect x="1220" y="252" width="89" height="40" rx="8" fill="#b71c1c" opacity="0.09" transform="rotate(0, 133, 329)"/>
    <rect x="1078" y="500" width="84" height="61" rx="8" fill="#b71c1c" opacity="0.06" transform="rotate(15, 230, 140)"/>
    <rect x="1176" y="105" width="53" height="73" rx="8" fill="#b71c1c" opacity="0.07" transform="rotate(20, 325, 389)"/>
    <rect x="672" y="183" width="79" height="81" rx="8" fill="#b71c1c" opacity="0.09" transform="rotate(4, 725, 8)"/>
    <rect x="909" y="461" width="91" height="80" rx="8" fill="#b71c1c" opacity="0.11" transform="rotate(9, 95, -81)"/>
    <rect x="1019" y="411" width="20" height="48" rx="8" fill="#b71c1c" opacity="0.05" transform="rotate(22, 631, 382)"/>
    <polygon points="298,24 352,132 244,132" fill="#880e4f" opacity="0.11"/>
    <polygon points="650,154 739,332 561,332" fill="#880e4f" opacity="0.04"/>
    <polygon points="1243,272 1286,358 1200,358" fill="#880e4f" opacity="0.11"/>
    <polygon points="900,315 980,475 820,475" fill="#880e4f" opacity="0.12"/>

  <!-- Wave at bottom -->
  <path d="M0,564 C360,597 840,531 1200,564 L1200,630 L0,630Z" fill="#880e4f" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    Nagasaki travel 안내
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    Nagasaki — 정보
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#ffd600" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#ffd600" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    Nagasaki Nagasaki travel 안내 — 정보
  </text>
</svg>